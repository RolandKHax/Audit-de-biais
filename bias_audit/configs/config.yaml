# Fichier: configs/config.yaml
# Configuration principale pour l'audit de biais

project:
  name: "Bias Audit - Classification Model"
  version: "1.0.0"
  author: "Data Science Team"
  description: "Audit complet de biais pour modèle de classification"

data:
  # Chemins des données
  raw_data_path: "data/raw/"
  processed_data_path: "data/processed/"
  
  # Configuration du dataset
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  stratify: true
  
  # Attributs protégés
  protected_attributes:
    - gender
    - race
  
  # Label cible
  label_name: "label"
  
  # Seuils de qualité
  quality_thresholds:
    max_missing_pct: 0.05  # Maximum 5% de valeurs manquantes
    max_duplicates_pct: 0.01  # Maximum 1% de doublons
    min_samples_per_group: 100  # Minimum 100 exemples par groupe

model:
  # Type de modèle
  type: "LogisticRegression"  # Options: LogisticRegression, RandomForest, GradientBoosting
  
  # Hyperparamètres baseline
  baseline:
    max_iter: 1000
    random_state: 42
    solver: "lbfgs"
  
  # Chemins de sauvegarde
  save_path: "models/"
  baseline_model_name: "baseline_model.pkl"

fairness:
  # Métriques à calculer
  metrics:
    - demographic_parity_difference
    - disparate_impact
    - equalized_odds
    - equal_opportunity
    - predictive_parity
  
  # Seuils de fairness
  thresholds:
    disparate_impact_min: 0.8
    disparate_impact_max: 1.25
    demographic_parity_diff_max: 0.1
    equalized_odds_diff_max: 0.1
  
  # Niveau de priorité des alertes
  alert_levels:
    critical: 0.7  # DI < 0.7 = critique
    warning: 0.8   # 0.7 <= DI < 0.8 = warning
    info: 0.9      # 0.8 <= DI < 0.9 = info

debiasing:
  # Techniques testées par le CLI Python 3.14.
  # Les méthodes adversarial/postprocessing existent comme pistes avancées dans le code,
  # mais ne font pas partie de l'exécution par défaut.
  techniques:
    - name: "reweighting"
      enabled: true
      type: "preprocessing"
    
    - name: "resampling"
      enabled: true
      type: "preprocessing"
      params:
        strategy: "oversample"  # oversample, undersample
    
    - name: "adversarial"
      enabled: false
      type: "inprocessing"
      optional_dependency: "tensorflow"
      note: "Non inclus dans requirements.txt pour conserver la compatibilité Python 3.14."
      params:
        hidden_dims: [64, 32]
        lambda_fairness: 0.8
        epochs: 50
        batch_size: 64
    
    - name: "threshold_optimization"
      enabled: false
      type: "postprocessing"
      note: "Disponible comme extension expérimentale, non branchée dans le CLI par défaut."
      params:
        constraint: "equalized_odds"  # equalized_odds, demographic_parity
  
  # Critères de sélection
  selection_criteria:
    min_disparate_impact: 0.8
    max_accuracy_loss: 0.05  # Maximum 5% de perte d'accuracy
    prefer: "compromise"  # Options: fairness, performance, compromise

evaluation:
  # Métriques de performance
  performance_metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
  
  # Cross-validation
  cv_folds: 5
  cv_scoring: "accuracy"
  
  # Bootstrapping pour intervalles de confiance
  bootstrap:
    enabled: true
    n_iterations: 1000
    confidence_level: 0.95

visualization:
  # Configuration des graphiques
  save_dir: "reports/figures/"
  format: "png"
  dpi: 300
  style: "whitegrid"
  
  # Taille par défaut des figures
  figsize:
    width: 14
    height: 6
  
  # Palette de couleurs
  colors:
    primary: "#2E86AB"
    secondary: "#A23B72"
    accent: "#F18F01"
    success: "#06A77D"
    warning: "#F77F00"
    danger: "#D62828"

reporting:
  # Configuration des rapports
  output_dir: "reports/"
  formats:
    - html
    - json
    - txt
  
  # Sections du rapport
  sections:
    - executive_summary
    - data_analysis
    - baseline_evaluation
    - debiasing_results
    - recommendations
    - model_card
  
  # Templates
  templates_dir: "reports/templates/"
  latex_template: "rapport_audit_biais.tex"

monitoring:
  # Configuration du monitoring en production
  enabled: false
  
  # Fréquence des vérifications
  check_frequency:
    fairness: "daily"
    performance: "daily"
    distribution: "weekly"
  
  # Alertes
  alerts:
    email:
      enabled: false
      recipients: []
    
    slack:
      enabled: false
      webhook_url: ""
    
    pagerduty:
      enabled: false
      api_key: ""

logging:
  # Configuration des logs
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Fichiers de log
  file:
    enabled: true
    path: "logs/"
    max_bytes: 10485760  # 10 MB
    backup_count: 5

advanced:
  # Options avancées
  
  # Analyse intersectionnelle
  intersectional_analysis:
    enabled: true
    max_combinations: 2  # Maximum 2 attributs combinés
  
  # Détection de proxys
  proxy_detection:
    enabled: true
    correlation_threshold: 0.3
    methods:
      - pearson
      - cramers_v
  
  # Interprétabilité
  interpretability:
    enabled: true
    method: "shap"  # shap, lime
    sample_size: 500
  
  # Reproductibilité
  reproducibility:
    seed_all: true
    save_environment: true
    track_versions: true
